<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamas Fekete | Causal AI</title>
    <meta
      name="description"
      content="Personal site of Dr. Tamas Fekete focused on causal AI projects, research directions, and publications."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-grid">
          <div class="hero-copy-wrap">
            <h1 id="hero-title"></h1>
            <p class="hero-copy" id="hero-summary"></p>
          </div>
          <aside class="hero-side">
            <article class="signal-card">
              <p class="card-tag">Current focus</p>
              <p class="signal-value" id="current-focus-title"></p>
              <p class="signal-copy" id="current-focus-copy"></p>
            </article>
          </aside>
        </div>
      </header>

      <main>
        <nav class="panel nav-panel" aria-label="Page sections">
          <div class="chip-row" id="section-nav"></div>
        </nav>

        <section class="panel" id="about">
          <div class="section-heading">
            <p class="section-kicker">About</p>
            <h2>Causal AI work</h2>
          </div>
          <div class="body-copy" id="about-copy"></div>
          <div class="focus-grid" id="focus-grid"></div>
        </section>

        <section class="panel" id="selected-work">
          <div class="section-heading">
            <p class="section-kicker">Selected Work</p>
            <h2>Public projects and demos</h2>
          </div>
          <div class="chip-row chip-row-secondary" id="work-nav"></div>
          <div class="work-grid" id="work-grid"></div>
        </section>

        <section class="panel" id="current">
          <div class="section-heading">
            <p class="section-kicker">Current</p>
            <h2>Current causal AI directions</h2>
          </div>
          <div class="body-copy" id="current-copy"></div>
          <div class="current-grid" id="current-grid"></div>
        </section>

        <section class="panel" id="publications">
          <div class="section-heading">
            <p class="section-kicker">Publications</p>
            <h2>Causal AI papers</h2>
          </div>
          <div class="publication-list" id="publication-list"></div>
        </section>
      </main>

    </div>

    <script src="./site-data.js"></script>
    <script>
      const byId = (id) => document.getElementById(id);
      const slugify = (value) =>
        value
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");

      const renderParagraphs = (targetId, paragraphs) => {
        const target = byId(targetId);
        paragraphs.forEach((paragraph) => {
          const p = document.createElement("p");
          p.textContent = paragraph;
          target.appendChild(p);
        });
      };

      const renderList = (targetId, items) => {
        const target = byId(targetId);
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          target.appendChild(li);
        });
      };

      byId("hero-title").textContent = siteData.hero.title;
      byId("hero-summary").textContent = siteData.hero.summary;
      byId("current-focus-title").textContent = siteData.hero.currentFocus.title;
      byId("current-focus-copy").textContent = siteData.hero.currentFocus.copy;

      renderParagraphs("about-copy", siteData.about);
      renderParagraphs("current-copy", siteData.current.intro);

      const sectionNav = byId("section-nav");
      siteData.navigation.forEach((item) => {
        const link = document.createElement("a");
        link.className = "chip-link";
        link.href = item.url;
        link.textContent = item.label;
        sectionNav.appendChild(link);
      });

      const focusGrid = byId("focus-grid");
      siteData.focusAreas.forEach((item) => {
        const card = document.createElement("article");
        card.className = "focus-card";
        card.innerHTML = `
          <p class="card-tag">${item.tag}</p>
          <h3>${item.title}</h3>
          <p>${item.copy}</p>
        `;
        focusGrid.appendChild(card);
      });

      const workNav = byId("work-nav");
      const workGrid = byId("work-grid");
      siteData.selectedWork.forEach((item) => {
        const workId = `work-${item.slug || slugify(item.title)}`;

        const navLink = document.createElement("a");
        navLink.className = "chip-link subtle";
        navLink.href = `#${workId}`;
        navLink.textContent = item.title;
        workNav.appendChild(navLink);

        const card = document.createElement("article");
        card.className = "work-card";
        card.id = workId;

        let visualMarkup = "";
        if (item.image && item.image.src) {
          visualMarkup = `
            <div class="work-visual image">
              <img src="${item.image.src}" alt="${item.image.alt}" loading="lazy" />
            </div>
          `;
        }

        const links = item.links
          .map((link) => {
            const target = link.external ? ' target="_blank" rel="noreferrer"' : "";
            return `<a href="${link.url}"${target}>${link.label}</a>`;
          })
          .join("");

        card.innerHTML = `
          ${visualMarkup}
          <div class="work-body">
            <h3>${item.title}</h3>
            <p class="work-summary">${item.summary}</p>
            <p class="work-summary">${item.detail}</p>
            <div class="link-row">${links}</div>
          </div>
        `;
        workGrid.appendChild(card);
      });

      const currentGrid = byId("current-grid");
      siteData.current.items.forEach((item) => {
        const card = document.createElement("article");
        card.className = "current-card";
        card.innerHTML = `
          <p class="card-tag">${item.tag}</p>
          <h3>${item.title}</h3>
          <p>${item.copy}</p>
        `;
        currentGrid.appendChild(card);
      });

      const publicationList = byId("publication-list");
      siteData.publications.forEach((paper) => {
        const card = document.createElement("article");
        card.className = "publication-card";

        const titleMarkup = paper.url
          ? `<h3><a href="${paper.url}" target="_blank" rel="noreferrer">${paper.title}</a></h3>`
          : `<h3>${paper.title}</h3>`;

        card.innerHTML = `
          <p class="publication-meta">${paper.meta}</p>
          ${titleMarkup}
          <p>${paper.authors}</p>
          <p class="publication-note">${paper.note}</p>
        `;
        publicationList.appendChild(card);
      });
    </script>
  </body>
</html>
