<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Tamas Fekete | Publications</title>
    <meta
      name="description"
      content="Selected publications on causal AI by Dr. Tamas Fekete."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow" id="eyebrow">Selected Publications</p>
        <h1 id="hero-title">Dr. Tamas Fekete</h1>
        <p class="hero-copy" id="hero-summary">Selected publications on causal AI.</p>
      </header>

      <main>
        <section class="panel" id="publications">
          <div class="section-heading">
            <p class="section-kicker">Causal AI</p>
            <h2>Selected papers</h2>
          </div>
          <div class="publication-list" id="publication-list"></div>
        </section>
      </main>

      <footer class="footer">
        <p id="footer-note">Selected causal AI publications.</p>
      </footer>
    </div>

    <script src="./site-data.js"></script>
    <script>
      const byId = (id) => document.getElementById(id);

      byId("eyebrow").textContent = siteData.hero.eyebrow;
      byId("hero-title").textContent = siteData.hero.title;
      byId("hero-summary").textContent = siteData.hero.summary;
      byId("footer-note").textContent = siteData.footer;

      const publicationList = byId("publication-list");
      siteData.publications.forEach((paper) => {
        const card = document.createElement("article");
        card.className = "publication-card";
        card.innerHTML = `
          <p class="publication-meta">${paper.meta}</p>
          <h3>${paper.title}</h3>
          <p>${paper.authors}</p>
        `;
        publicationList.appendChild(card);
      });
    </script>
  </body>
</html>
