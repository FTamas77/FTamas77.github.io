<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Tamas Fekete | Causal AI</title>
    <meta
      name="description"
      content="Platforms, open-source tools, and peer-reviewed research turning causal AI into actionable evidence for manufacturing, transport, and sustainability."
    />
    <meta
      property="og:title"
      content="Dr. Tamas Fekete — Causal AI for Industrial Intelligence"
    />
    <meta
      property="og:description"
      content="PhD researcher building causal discovery platforms, open-source tools, and publishing peer-reviewed papers on industrial decision support."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ftamas77.github.io/" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='8' cy='16' r='3.5' fill='%2300d4aa'/><circle cx='24' cy='7' r='3' fill='%230ea5e9'/><circle cx='24' cy='25' r='3' fill='%2300d4aa'/><line x1='11' y1='14' x2='21' y2='9' stroke='%2300d4aa' stroke-width='1.5' opacity='.5'/><line x1='11' y1='18' x2='21' y2='23' stroke='%230ea5e9' stroke-width='1.5' opacity='.5'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Progress bar -->
    <div class="progress-bar" id="progress-bar"></div>

    <!-- ========== HERO ========== -->
    <header class="hero" id="hero">
      <canvas id="dag-canvas" class="dag-canvas"></canvas>
      <div class="hero-overlay"></div>
      <div class="container hero-content">
        <div class="hero-badge" id="hero-badge"></div>
        <h1 class="hero-title gradient-text" id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>

        <div class="hero-actions" id="hero-actions"></div>
      </div>
      <div class="scroll-indicator">
        <span>Scroll to explore</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 5v14M19 12l-7 7-7-7" />
        </svg>
      </div>
    </header>

    <!-- ========== STICKY NAV ========== -->
    <nav class="main-nav" id="main-nav">
      <div class="container nav-inner">
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-right">
          <button
            class="theme-toggle"
            id="theme-toggle"
            aria-label="Toggle theme"
          >
            <svg
              id="icon-moon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
            </svg>
            <svg
              id="icon-sun"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="display: none"
            >
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- ========== ABOUT ========== -->
    <section class="section" id="about">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-label">About</span>
          <h2>Research Focus</h2>
        </div>
        <div class="about-intro reveal" id="about-intro"></div>
        <div class="focus-grid" id="focus-grid"></div>
      </div>
    </section>

    <!-- ========== PROJECTS ========== -->
    <section class="section" id="selected-work">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-label">Projects</span>
          <h2>Selected Work</h2>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </section>

    <!-- ========== PUBLICATIONS ========== -->
    <section class="section" id="publications">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-label">Publications</span>
          <h2>Peer-Reviewed Papers</h2>
        </div>
        <div class="publications-grid" id="publications-grid"></div>
      </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
      <div class="container footer-inner">
        <p class="footer-copy" id="footer-copy"></p>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <!-- ========== DATA + SCRIPTS ========== -->
    <script src="./site-data.js"></script>
    <script>
      /* ------------------------------------------------------------------
         Helpers
         ------------------------------------------------------------------ */
      const $ = (id) => document.getElementById(id);
      const esc = (str) => {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      };

      /* SVG icons (inline, no external deps) */
      const icons = {
        github: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>`,
        external: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>`,
        thesis: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>`,
        platform: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`,
      };

      /* ------------------------------------------------------------------
         HERO
         ------------------------------------------------------------------ */
      const badge = $("hero-badge");
      badge.textContent = siteData.owner.name;
      const cred = document.createElement("span");
      cred.className = "hero-credential";
      cred.textContent = siteData.owner.credential;
      badge.appendChild(cred);

      $("hero-title").textContent = siteData.hero.title;
      $("hero-subtitle").textContent = siteData.hero.subtitle;

      /* Action buttons */
      const actionsEl = $("hero-actions");
      actionsEl.innerHTML = `
        <a href="#selected-work" class="btn btn-primary">View Projects</a>
        <a href="${siteData.social[0].url}" class="btn btn-ghost" target="_blank" rel="noreferrer">
          ${icons.github} GitHub
        </a>
        <a href="${siteData.social[1].url}" class="btn btn-ghost" target="_blank" rel="noreferrer">
          ${icons.platform} mira Platform
        </a>
      `;

      /* ------------------------------------------------------------------
         NAV
         ------------------------------------------------------------------ */
      const navLinksEl = $("nav-links");
      siteData.navigation.forEach((item) => {
        const a = document.createElement("a");
        a.className = "nav-link";
        a.href = item.url;
        a.textContent = item.label;
        a.dataset.section = item.url.replace("#", "");
        a.addEventListener("click", (e) => {
          e.preventDefault();
          document
            .querySelector(item.url)
            .scrollIntoView({ behavior: "smooth" });
        });
        navLinksEl.appendChild(a);
      });

      /* ------------------------------------------------------------------
         ABOUT
         ------------------------------------------------------------------ */
      const aboutEl = $("about-intro");
      siteData.about.forEach((text) => {
        const p = document.createElement("p");
        p.textContent = text;
        aboutEl.appendChild(p);
      });

      const focusGridEl = $("focus-grid");
      siteData.focusAreas.forEach((item, i) => {
        const card = document.createElement("article");
        card.className = `focus-card reveal reveal-delay-${Math.min(i + 1, 5)}`;
        card.innerHTML = `
          <span class="card-tag">${esc(item.tag)}</span>
          <h3>${esc(item.title)}</h3>
          <p>${esc(item.copy)}</p>
        `;
        focusGridEl.appendChild(card);
      });

      /* ------------------------------------------------------------------
         PROJECTS
         ------------------------------------------------------------------ */
      const projectsGridEl = $("projects-grid");

      siteData.selectedWork.forEach((item) => {
        if (item.featured) {
          /* Featured card */
          const card = document.createElement("article");
          card.className = "featured-card reveal";

          let visualHTML = "";
          if (item.image && item.image.src) {
            visualHTML = `<div class="project-visual"><img src="${esc(item.image.src)}" alt="${esc(item.image.alt)}" loading="lazy" /></div>`;
          }

          const highlightsHTML = item.highlights
            ? `<ul class="project-highlights">${item.highlights.map((h) => `<li>${esc(h)}</li>`).join("")}</ul>`
            : "";

          const linksHTML = item.links
            .map(
              (l) =>
                `<a href="${l.url}" class="project-link" target="_blank" rel="noreferrer">${icons.external} ${esc(l.label)}</a>`,
            )
            .join("");

          card.innerHTML = `
            ${visualHTML}
            <div class="project-body">
              ${item.featuredLabel ? `<span class="featured-label">${esc(item.featuredLabel)}</span>` : ""}
              <h3>${esc(item.title)}</h3>
              <p class="project-summary">${esc(item.summary)}</p>
              ${highlightsHTML}
              <div class="project-links">${linksHTML}</div>
            </div>
          `;
          projectsGridEl.appendChild(card);
        }
      });

      /* Non-featured cards wrapper */
      const cardsWrap = document.createElement("div");
      cardsWrap.className = "project-cards";
      projectsGridEl.appendChild(cardsWrap);

      siteData.selectedWork.forEach((item, i) => {
        if (item.featured) return;
        const card = document.createElement("article");
        card.className = `project-card reveal reveal-delay-${Math.min(i, 5)}`;

        const typeTag = item.type
          ? `<span class="project-type">${esc(item.type)}</span>`
          : "";
        const linksHTML = item.links
          .map(
            (l) =>
              `<a href="${l.url}" class="project-link" target="_blank" rel="noreferrer">${icons.external} ${esc(l.label)}</a>`,
          )
          .join("");

        card.innerHTML = `
          <div class="card-header">
            <h3>${esc(item.title)}</h3>
            ${typeTag}
          </div>
          <p class="project-summary">${esc(item.summary)}</p>
          <p class="project-detail">${esc(item.detail)}</p>
          <div class="project-links">${linksHTML}</div>
        `;
        cardsWrap.appendChild(card);
      });

      /* ------------------------------------------------------------------
         PUBLICATIONS
         ------------------------------------------------------------------ */
      const pubGridEl = $("publications-grid");
      siteData.publications.forEach((paper, i) => {
        const card = document.createElement("article");
        card.className = `pub-card reveal reveal-delay-${Math.min(i + 1, 5)}`;

        /* Extract year from meta */
        const yearMatch = paper.meta.match(/\d{4}/);
        const year = yearMatch ? yearMatch[0] : "";
        /* Extract venue (everything before the year) */
        const venue = paper.meta.replace(/,?\s*\d{4}/, "").trim();

        const titleHTML = paper.url
          ? `<h3><a href="${paper.url}" target="_blank" rel="noreferrer">${esc(paper.title)}</a></h3>`
          : `<h3>${esc(paper.title)}</h3>`;

        card.innerHTML = `
          <div class="pub-year">${esc(year)}</div>
          <div class="pub-body">
            <span class="pub-venue">${esc(venue)}</span>
            ${titleHTML}
            <p class="pub-authors">${esc(paper.authors)}</p>
            <p class="pub-note">${esc(paper.note)}</p>
          </div>
        `;
        pubGridEl.appendChild(card);
      });

      /* ------------------------------------------------------------------
         FOOTER
         ------------------------------------------------------------------ */
      $("footer-copy").textContent =
        `\u00A9 ${new Date().getFullYear()} ${siteData.owner.name}`;
      const footerLinksEl = $("footer-links");
      siteData.social.forEach((s) => {
        const a = document.createElement("a");
        a.className = "footer-link";
        a.href = s.url;
        a.target = "_blank";
        a.rel = "noreferrer";
        a.innerHTML = `${icons[s.icon] || icons.external} ${esc(s.label)}`;
        footerLinksEl.appendChild(a);
      });

      /* ------------------------------------------------------------------
         ANIMATED DAG BACKGROUND
         ------------------------------------------------------------------ */
      (function initDAG() {
        const canvas = $("dag-canvas");
        const ctx = canvas.getContext("2d");
        let w, h, dpr;
        const nodes = [];
        const NODE_COUNT = window.innerWidth < 640 ? 20 : 35;
        const EDGE_DIST = window.innerWidth < 640 ? 140 : 200;

        function resize() {
          dpr = window.devicePixelRatio || 1;
          w = canvas.clientWidth;
          h = canvas.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function init() {
          resize();
          for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vx: (Math.random() - 0.5) * 0.25,
              vy: (Math.random() - 0.5) * 0.25,
              r: Math.random() * 2.5 + 1.2,
              opacity: Math.random() * 0.4 + 0.12,
            });
          }
        }

        function getAccentColor() {
          return getComputedStyle(document.documentElement)
            .getPropertyValue("--accent")
            .trim();
        }

        function hexToRgb(hex) {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return { r, g, b };
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);
          const accent = hexToRgb(getAccentColor());

          /* Update */
          nodes.forEach((n) => {
            n.x += n.vx;
            n.y += n.vy;
            if (n.x < -20) n.x = w + 20;
            if (n.x > w + 20) n.x = -20;
            if (n.y < -20) n.y = h + 20;
            if (n.y > h + 20) n.y = -20;
          });

          /* Edges */
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < EDGE_DIST) {
                const alpha = (1 - dist / EDGE_DIST) * 0.12;
                ctx.strokeStyle = `rgba(${accent.r},${accent.g},${accent.b},${alpha})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
              }
            }
          }

          /* Nodes */
          nodes.forEach((n) => {
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${accent.r},${accent.g},${accent.b},${n.opacity})`;
            ctx.fill();
          });

          requestAnimationFrame(draw);
        }

        init();
        draw();
        window.addEventListener("resize", resize);
      })();

      /* ------------------------------------------------------------------
         THEME TOGGLE
         ------------------------------------------------------------------ */
      (function initTheme() {
        const html = document.documentElement;
        const btnToggle = $("theme-toggle");
        const moonIcon = $("icon-moon");
        const sunIcon = $("icon-sun");

        const saved = localStorage.getItem("theme");
        if (saved) {
          html.dataset.theme = saved;
        }
        syncIcons();

        btnToggle.addEventListener("click", () => {
          const next = html.dataset.theme === "dark" ? "light" : "dark";
          html.dataset.theme = next;
          localStorage.setItem("theme", next);
          syncIcons();
        });

        function syncIcons() {
          const isDark = html.dataset.theme === "dark";
          moonIcon.style.display = isDark ? "block" : "none";
          sunIcon.style.display = isDark ? "none" : "block";
        }
      })();

      /* ------------------------------------------------------------------
         PROGRESS BAR
         ------------------------------------------------------------------ */
      const progressBar = $("progress-bar");
      function updateProgress() {
        const scrollTop = window.scrollY;
        const docHeight =
          document.documentElement.scrollHeight - window.innerHeight;
        const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        progressBar.style.width = pct + "%";
      }
      window.addEventListener("scroll", updateProgress, { passive: true });

      /* ------------------------------------------------------------------
         SCROLL SPY + NAV SHADOW
         ------------------------------------------------------------------ */
      const navEl = $("main-nav");
      const sectionIds = siteData.navigation.map((n) => n.url.replace("#", ""));
      const sectionEls = sectionIds.map((id) => document.getElementById(id));
      const navLinkEls = navLinksEl.querySelectorAll(".nav-link");

      function onScroll() {
        /* Nav shadow */
        navEl.classList.toggle("scrolled", window.scrollY > 10);

        /* Active section */
        let current = sectionIds[0];
        sectionEls.forEach((sec) => {
          if (sec && sec.getBoundingClientRect().top <= 120) {
            current = sec.id;
          }
        });
        navLinkEls.forEach((link) => {
          link.classList.toggle("active", link.dataset.section === current);
        });
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();

      /* ------------------------------------------------------------------
         SCROLL REVEAL (IntersectionObserver)
         ------------------------------------------------------------------ */
      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
            }
          });
        },
        { threshold: 0.08, rootMargin: "0px 0px -40px 0px" },
      );
      document
        .querySelectorAll(".reveal")
        .forEach((el) => revealObserver.observe(el));
    </script>
  </body>
</html>
