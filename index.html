<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamas Fekete | Causal AI</title>
    <meta
      name="description"
      content="Public causal AI projects, repositories, demos, and publications focused on industrial decision support."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-grid">
          <div class="hero-copy-wrap">
            <p class="site-owner">Dr. Tamas Fekete</p>
            <h1 id="hero-title"></h1>
            <p class="hero-copy" id="hero-summary"></p>
          </div>
          <aside class="hero-side">
            <article class="signal-card">
              <p class="card-tag">Method</p>
              <p class="signal-value" id="project-focus-title"></p>
              <p class="signal-copy" id="project-focus-copy"></p>
            </article>
          </aside>
        </div>
      </header>

      <main>
        <nav class="panel nav-panel" aria-label="Page sections">
          <div class="chip-row" id="section-nav" role="tablist"></div>
        </nav>

        <section class="panel tab-panel" id="about" data-section-panel role="tabpanel">
          <div class="section-heading">
            <p class="section-kicker">Scope</p>
            <h2>What this portfolio covers</h2>
          </div>
          <div class="body-copy" id="about-copy"></div>
          <div class="focus-grid" id="focus-grid"></div>
        </section>

        <section class="panel tab-panel" id="selected-work" data-section-panel role="tabpanel">
          <div class="section-heading">
            <p class="section-kicker">Selected Work</p>
            <h2>Projects and demos</h2>
          </div>
          <div class="work-grid" id="work-grid"></div>
        </section>

        <section class="panel tab-panel" id="publications" data-section-panel role="tabpanel">
          <div class="section-heading">
            <p class="section-kicker">Publications</p>
            <h2>Causal AI papers</h2>
          </div>
          <div class="publication-list" id="publication-list"></div>
        </section>
      </main>

    </div>

    <script src="./site-data.js"></script>
    <script>
      const byId = (id) => document.getElementById(id);
      const slugify = (value) =>
        value
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");

      const renderParagraphs = (targetId, paragraphs) => {
        const target = byId(targetId);
        paragraphs.forEach((paragraph) => {
          const p = document.createElement("p");
          p.textContent = paragraph;
          target.appendChild(p);
        });
      };

      const renderList = (targetId, items) => {
        const target = byId(targetId);
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          target.appendChild(li);
        });
      };

      byId("hero-title").textContent = siteData.hero.title;
      byId("hero-summary").textContent = siteData.hero.summary;
      byId("project-focus-title").textContent = siteData.hero.projectFocus.title;
      byId("project-focus-copy").textContent = siteData.hero.projectFocus.copy;

      renderParagraphs("about-copy", siteData.about);

      const sectionNav = byId("section-nav");
      const sectionIds = siteData.navigation.map((item) => item.url.replace("#", ""));

      siteData.navigation.forEach((item) => {
        const sectionId = item.url.replace("#", "");
        const link = document.createElement("a");
        link.className = "chip-link";
        link.href = item.url;
        link.textContent = item.label;
        link.dataset.sectionTarget = sectionId;
        link.setAttribute("role", "tab");
        link.setAttribute("aria-controls", sectionId);
        link.setAttribute("aria-selected", "false");
        link.addEventListener("click", (event) => {
          event.preventDefault();
          setActiveSection(sectionId, { updateHash: true });
        });
        sectionNav.appendChild(link);
      });

      const focusGrid = byId("focus-grid");
      siteData.focusAreas.forEach((item) => {
        const card = document.createElement("article");
        card.className = "focus-card";
        card.innerHTML = `
          <p class="card-tag">${item.tag}</p>
          <h3>${item.title}</h3>
          <p>${item.copy}</p>
        `;
        focusGrid.appendChild(card);
      });

      const workGrid = byId("work-grid");
      siteData.selectedWork.forEach((item) => {
        const workId = `work-${item.slug || slugify(item.title)}`;

        const card = document.createElement("article");
        card.className = item.featured ? "work-card featured-work" : "work-card";
        card.id = workId;

        let visualMarkup = "";
        if (item.image && item.image.src) {
          visualMarkup = `
            <div class="work-visual image">
              <img src="${item.image.src}" alt="${item.image.alt}" loading="lazy" />
            </div>
          `;
        }

        const links = item.links
          .map((link) => {
            const target = link.external ? ' target="_blank" rel="noreferrer"' : "";
            return `<a href="${link.url}"${target}>${link.label}</a>`;
          })
          .join("");

        const featuredLabel = item.featuredLabel
          ? `<p class="card-tag">${item.featuredLabel}</p>`
          : "";

        const highlights = item.highlights
          ? `<ul class="work-highlights">${item.highlights
              .map((highlight) => `<li>${highlight}</li>`)
              .join("")}</ul>`
          : "";

        card.innerHTML = `
          ${visualMarkup}
          <div class="work-body">
            ${featuredLabel}
            <h3>${item.title}</h3>
            <p class="work-summary">${item.summary}</p>
            <p class="work-summary">${item.detail}</p>
            ${highlights}
            <div class="link-row">${links}</div>
          </div>
        `;
        workGrid.appendChild(card);
      });

      const publicationList = byId("publication-list");
      siteData.publications.forEach((paper) => {
        const card = document.createElement("article");
        card.className = "publication-card";

        const titleMarkup = paper.url
          ? `<h3><a href="${paper.url}" target="_blank" rel="noreferrer">${paper.title}</a></h3>`
          : `<h3>${paper.title}</h3>`;

        card.innerHTML = `
          <p class="publication-meta">${paper.meta}</p>
          ${titleMarkup}
          <p>${paper.authors}</p>
          <p class="publication-note">${paper.note}</p>
        `;
        publicationList.appendChild(card);
      });

      const sectionPanels = sectionIds.map((id) => byId(id));
      const getSectionIdFromHash = () => {
        const hashId = window.location.hash.replace("#", "");

        if (sectionIds.includes(hashId)) {
          return hashId;
        }

        const nestedTarget = hashId ? byId(hashId) : null;
        return nestedTarget?.closest("[data-section-panel]")?.id || "selected-work";
      };

      function setActiveSection(sectionId, options = {}) {
        const { updateHash = false } = options;

        sectionPanels.forEach((panel) => {
          const active = panel.id === sectionId;
          panel.hidden = !active;
          panel.classList.toggle("active-panel", active);
        });

        sectionNav.querySelectorAll("[data-section-target]").forEach((link) => {
          const active = link.dataset.sectionTarget === sectionId;
          link.classList.toggle("active", active);
          link.setAttribute("aria-selected", String(active));
        });

        if (updateHash) {
          history.pushState(null, "", `#${sectionId}`);
        }
      }

      setActiveSection(getSectionIdFromHash());

      window.addEventListener("hashchange", () => {
        setActiveSection(getSectionIdFromHash());
      });
    </script>
  </body>
</html>
